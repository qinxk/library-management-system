spring:
  web:
    resources:
      # Single handler in SpaWebConfig (SPA fallback + /assets/**)
      add-mappings: false
  application:
    name: library-backend
  datasource:
    url: jdbc:h2:file:./data/librarydb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      settings:
        web-allow-others: false
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

app:
  jwt:
    secret: "replace-with-at-least-32-characters-demo-secret-key"
    expiration-ms: 86400000
  seed:
    admin-username: admin
    admin-password: admin123456
  library:
    max-active-loans: 5
    loan-days: 14
